<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Bible(These are .13 .0. v0.13.0)</title>
    <style>
        /* A utility class to visually hide text while keeping it accessible to screen readers */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        #splash-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 100;
        }
        #init-button {
            font-size: 1.5rem;
            padding: 1rem 2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="splash-screen" role="application">
        <button id="init-button" autofocus>Press Enter to Begin</button>
    </div>

    <div id="aria-announcer" aria-live="polite" class="sr-only"></div>

    <main id="app-container" style="display: none;">
        <h1>Accessible Study Bible</h1>
        <p>Press '?' for keyboard commands.</p>

        <div id="focus-trap" role="application" tabindex="0" class="sr-only"></div>
        <input type="text" id="search-input" class="sr-only" aria-label="Search Query">
        <textarea id="note-editor" class="sr-only" aria-label="Verse Note"></textarea>

        <div id="content-display" aria-hidden="true">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
